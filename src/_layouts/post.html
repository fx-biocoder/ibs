---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%d de %B de %Y" }}
      </time>
      {% if page.categories %}
        · Categorías: {{ page.categories | join: ", " }}
      {% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <p>¿Te gustó este artículo? <a href="{{ site.baseurl }}/">Volver al inicio</a></p>
  </footer>
</article>
