<!-- LÓGICA DEMO INTERACTIVA -->
<script>
function ibs_calcular(co2, mo, ph, temp) {
  const co2_norm = Math.max(0, Math.min(1, (co2 - 30)  / (600 - 30)));
  const mo_norm = Math.max(0, Math.min(1, (mo - 0.3) / (6.0 - 0.3)));
  const ph_score = Math.exp(-0.5 * Math.pow((ph - 6.5) / 1.2, 2));
  const temp_score = Math.exp(-0.5 * Math.pow((temp - 22.0) / 8.0, 2));
  return Math.round(((co2_norm * 0.40) + (mo_norm * 0.30) + (ph_score * 0.20) + (temp_score * 0.10)) * 1000) / 10;
}

const estados = [
  { max: 30, label: 'CRÍTICO', color: '#EF4444', desc: 'Enmienda orgánica urgente. Suspender toda labranza.' },
  { max: 50, label: 'BAJO', color: '#F97316', desc: 'Incorporar compost. Rotación de cultivos.' },
  { max: 70, label: 'MODERADO', color: '#CA8A04', desc: 'Aplicar bioestimulante liviano. Remonitorear en 90 días.' },
  { max: 85, label: 'BUENO', color: '#16A34A', desc: 'Mantener el manejo actual. Muestra anual.' },
  { max: 100, label: 'EXCELENTE',color: '#2563EB', desc: 'No intervenir. Documentar como caso de referencia.' },
];

function asignar_estado(ibs) {
  return estados.find(e => ibs <= e.max) || estados[estados.length - 1];
}

function actualizar() {
  const co2 = parseFloat(document.getElementById('sl_co2').value);
  const mo = parseFloat(document.getElementById('sl_mo').value);
  const ph = parseFloat(document.getElementById('sl_ph').value);
  const temp = parseFloat(document.getElementById('sl_temp').value);

  document.getElementById('val_co2').textContent = co2;
  document.getElementById('val_mo').textContent = mo.toFixed(1);
  document.getElementById('val_ph').textContent = ph.toFixed(1);
  document.getElementById('val_temp').textContent = temp;

  const ibs    = ibs_calcular(co2, mo, ph, temp);
  const estado = asignar_estado(ibs);

  document.getElementById('demo_numero').textContent = ibs.toFixed(1);
  document.getElementById('demo_numero').style.color = estado.color;
  document.getElementById('demo_estado').textContent = estado.label;
  document.getElementById('demo_estado').style.color = estado.color;
  document.getElementById('demo_barra').style.width = ibs + '%';
  document.getElementById('demo_barra').style.background = estado.color;
  document.getElementById('demo_desc').textContent = estado.desc;
}

['sl_co2','sl_mo','sl_ph','sl_temp'].forEach(id => {
  document.getElementById(id).addEventListener('input', actualizar);
});

actualizar();
</script>
